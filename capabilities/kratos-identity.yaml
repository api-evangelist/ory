        call: kratos-identity.getidentity
        with:
          id: rest.id
          include_credential: rest.include_credential
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchidentity
        description: Patch an Identity
        call: kratos-identity.patchidentity
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
