naftiko: 1.0.0-alpha2
info:
  label: Ory Identities API — identity
  description: 'Ory Identities API — identity. 19 operations. Lead operation: List Identities. Self-contained Naftiko capability
    covering one Ory business surface.'
  tags:
  - Ory
  - identity
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORY_API_KEY: ORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: kratos-identity
    baseUri: ''
    description: Ory Identities API — identity business capability. Self-contained, no shared references.
    resources:
    - name: admin-identities
      path: /admin/identities
      operations:
      - name: listidentities
        method: GET
        description: List Identities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: per_page
          in: query
          type: integer
          description: Deprecated Items per Page
        - name: page
          in: query
          type: integer
          description: Deprecated Pagination Page
        - name: page_size
          in: query
          type: integer
          description: Page Size
        - name: page_token
          in: query
          type: string
          description: Next Page Token
        - name: consistency
          in: query
          type: string
          description: Read Consistency Level (preview)
        - name: ids
          in: query
          type: array
          description: Retrieve multiple identities by their IDs.
        - name: credentials_identifier
          in: query
          type: string
          description: CredentialsIdentifier is the identifier (username, email) of the credentials to look up using exact
            match.
        - name: preview_credentials_identifier_similar
          in: query
          type: string
          description: This is an EXPERIMENTAL parameter that WILL CHANGE. Do NOT rely on consistent, deterministic behavior.
        - name: include_credential
          in: query
          type: array
          description: Include Credentials in Response
        - name: organization_id
          in: query
          type: string
          description: List identities that belong to a specific organization.
      - name: batchpatchidentities
        method: PATCH
        description: Create multiple identities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: createidentity
        method: POST
        description: Create an Identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: admin-identities-by-external-externalID
      path: /admin/identities/by/external/{externalID}
      operations:
      - name: getidentitybyexternalid
        method: GET
        description: Get an Identity by its External ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: externalID
          in: path
          type: string
          description: ExternalID must be set to the ID of identity you want to get
          required: true
        - name: include_credential
          in: query
          type: array
          description: Include Credentials in Response
    - name: admin-identities-id
      path: /admin/identities/{id}
      operations:
      - name: deleteidentity
        method: DELETE
        description: Delete an Identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID is the identity's ID.
          required: true
      - name: getidentity
        method: GET
        description: Get an Identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID must be set to the ID of identity you want to get
          required: true
        - name: include_credential
          in: query
          type: array
          description: Include Credentials in Response
      - name: patchidentity
        method: PATCH
        description: Patch an Identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID must be set to the ID of identity you want to update
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: updateidentity
        method: PUT
        description: Update an Identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID must be set to the ID of identity you want to update
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: admin-identities-id-credentials-type
      path: /admin/identities/{id}/credentials/{type}
      operations:
      - name: deleteidentitycredentials
        method: DELETE
        description: Delete a credential for a specific identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID is the identity's ID.
          required: true
        - name: type
          in: path
          type: string
          description: Type is the type of credentials to delete.
          required: true
        - name: identifier
          in: query
          type: string
          description: Identifier is the identifier of the OIDC/SAML credential to delete.
    - name: admin-identities-id-sessions
      path: /admin/identities/{id}/sessions
      operations:
      - name: deleteidentitysessions
        method: DELETE
        description: Delete & Invalidate an Identity's Sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID is the identity's ID.
          required: true
      - name: listidentitysessions
        method: GET
        description: List an Identity's Sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: per_page
          in: query
          type: integer
          description: Deprecated Items per Page
        - name: page
          in: query
          type: integer
          description: Deprecated Pagination Page
        - name: page_size
          in: query
          type: integer
          description: Page Size
        - name: page_token
          in: query
          type: string
          description: Next Page Token
        - name: id
          in: path
          type: string
          description: ID is the identity's ID.
          required: true
        - name: active
          in: query
          type: boolean
          description: Active is a boolean flag that filters out sessions based on the state. If no value is provided, all
            sessions are returned.
    - name: admin-recovery-code
      path: /admin/recovery/code
      operations:
      - name: createrecoverycodeforidentity
        method: POST
        description: Create a Recovery Code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: admin-recovery-link
      path: /admin/recovery/link
      operations:
      - name: createrecoverylinkforidentity
        method: POST
        description: Create a Recovery Link
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: return_to
          in: query
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: admin-sessions
      path: /admin/sessions
      operations:
      - name: listsessions
        method: GET
        description: List All Sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_size
          in: query
          type: integer
          description: Items per Page
        - name: page_token
          in: query
          type: string
          description: Next Page Token
        - name: active
          in: query
          type: boolean
          description: Active is a boolean flag that filters out sessions based on the state. If no value is provided, all
            sessions are returned.
        - name: expand
          in: query
          type: array
          description: ExpandOptions is a query parameter encoded list of all properties that must be expanded in the Session.
    - name: admin-sessions-id
      path: /admin/sessions/{id}
      operations:
      - name: disablesession
        method: DELETE
        description: Deactivate a Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID is the session's ID.
          required: true
      - name: getsession
        method: GET
        description: Get Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: ExpandOptions is a query parameter encoded list of all properties that must be expanded in the Session.
        - name: id
          in: path
          type: string
          description: ID is the session's ID.
          required: true
    - name: admin-sessions-id-extend
      path: /admin/sessions/{id}/extend
      operations:
      - name: extendsession
        method: PATCH
        description: Extend a Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID is the session's ID.
          required: true
    - name: schemas
      path: /schemas
      operations:
      - name: listidentityschemas
        method: GET
        description: Get all Identity Schemas
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: per_page
          in: query
          type: integer
          description: Deprecated Items per Page
        - name: page
          in: query
          type: integer
          description: Deprecated Pagination Page
        - name: page_size
          in: query
          type: integer
          description: Page Size
        - name: page_token
          in: query
          type: string
          description: Next Page Token
    - name: schemas-id
      path: /schemas/{id}
      operations:
      - name: getidentityschema
        method: GET
        description: Get Identity JSON Schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID must be set to the ID of schema you want to get
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ORY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kratos-identity-rest
    port: 8080
    description: REST adapter for Ory Identities API — identity. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/identities
      name: admin-identities
      description: REST surface for admin-identities.
      operations:
      - method: GET
        name: listidentities
        description: List Identities
        call: kratos-identity.listidentities
        with:
          per_page: rest.per_page
          page: rest.page
          page_size: rest.page_size
          page_token: rest.page_token
          consistency: rest.consistency
          ids: rest.ids
          credentials_identifier: rest.credentials_identifier
          preview_credentials_identifier_similar: rest.preview_credentials_identifier_similar
          include_credential: rest.include_credential
          organization_id: rest.organization_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: batchpatchidentities
        description: Create multiple identities
        call: kratos-identity.batchpatchidentities
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createidentity
        description: Create an Identity
        call: kratos-identity.createidentity
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/identities/by/external/{externalid}
