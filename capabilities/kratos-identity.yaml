      operations:
      - method: POST
        name: createrecoverycodeforidentity
        description: Create a Recovery Code
        call: kratos-identity.createrecoverycodeforidentity
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/recovery/link
