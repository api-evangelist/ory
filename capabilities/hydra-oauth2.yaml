naftiko: 1.0.0-alpha2
info:
  label: Ory Hydra API — oAuth2
  description: 'Ory Hydra API — oAuth2. 31 operations. Lead operation: List OAuth 2.0 Clients. Self-contained Naftiko capability
    covering one Ory business surface.'
  tags:
  - Ory
  - oAuth2
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORY_API_KEY: ORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: hydra-oauth2
    baseUri: ''
    description: Ory Hydra API — oAuth2 business capability. Self-contained, no shared references.
    resources:
    - name: admin-clients
      path: /admin/clients
      operations:
      - name: listoauth2clients
        method: GET
        description: List OAuth 2.0 Clients
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_size
          in: query
          type: integer
          description: Items per Page
        - name: page_token
          in: query
          type: string
          description: Next Page Token
        - name: client_name
          in: query
          type: string
          description: The name of the clients to filter by.
        - name: owner
          in: query
          type: string
          description: The owner of the clients to filter by.
      - name: createoauth2client
        method: POST
        description: Create OAuth 2.0 Client
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin-clients-id
      path: /admin/clients/{id}
      operations:
      - name: deleteoauth2client
        method: DELETE
        description: Delete OAuth 2.0 Client
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the OAuth 2.0 Client.
          required: true
      - name: getoauth2client
        method: GET
        description: Get an OAuth 2.0 Client
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the OAuth 2.0 Client.
          required: true
      - name: patchoauth2client
        method: PATCH
        description: Patch OAuth 2.0 Client
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the OAuth 2.0 Client.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: setoauth2client
        method: PUT
        description: Set OAuth 2.0 Client
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: OAuth 2.0 Client ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin-clients-id-lifespans
      path: /admin/clients/{id}/lifespans
      operations:
      - name: setoauth2clientlifespans
        method: PUT
        description: Set OAuth2 Client Token Lifespans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: OAuth 2.0 Client ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: admin-oauth2-auth-requests-consent
      path: /admin/oauth2/auth/requests/consent
      operations:
      - name: getoauth2consentrequest
        method: GET
        description: Get OAuth 2.0 Consent Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: consent_challenge
          in: query
          type: string
          description: OAuth 2.0 Consent Request Challenge
          required: true
    - name: admin-oauth2-auth-requests-consent-accept
      path: /admin/oauth2/auth/requests/consent/accept
      operations:
      - name: acceptoauth2consentrequest
        method: PUT
        description: Accept OAuth 2.0 Consent Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: consent_challenge
          in: query
          type: string
          description: OAuth 2.0 Consent Request Challenge
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: admin-oauth2-auth-requests-consent-reject
      path: /admin/oauth2/auth/requests/consent/reject
      operations:
      - name: rejectoauth2consentrequest
        method: PUT
        description: Reject OAuth 2.0 Consent Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: consent_challenge
          in: query
          type: string
          description: OAuth 2.0 Consent Request Challenge
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
