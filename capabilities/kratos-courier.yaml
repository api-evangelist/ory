naftiko: 1.0.0-alpha2
info:
  label: Ory Identities API — courier
  description: 'Ory Identities API — courier. 2 operations. Lead operation: List Messages. Self-contained Naftiko capability
    covering one Ory business surface.'
  tags:
  - Ory
  - courier
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORY_API_KEY: ORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: kratos-courier
    baseUri: ''
    description: Ory Identities API — courier business capability. Self-contained, no shared references.
    resources:
    - name: admin-courier-messages
      path: /admin/courier/messages
      operations:
      - name: listcouriermessages
        method: GET
        description: List Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_size
          in: query
          type: integer
          description: Items per Page
        - name: page_token
          in: query
          type: string
          description: Next Page Token
        - name: status
          in: query
          type: string
          description: Status filters out messages based on status.
        - name: recipient
          in: query
          type: string
          description: Recipient filters out messages based on recipient.
    - name: admin-courier-messages-id
      path: /admin/courier/messages/{id}
      operations:
      - name: getcouriermessage
        method: GET
        description: Get a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: MessageID is the ID of the message.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ORY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kratos-courier-rest
    port: 8080
    description: REST adapter for Ory Identities API — courier. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/courier/messages
      name: admin-courier-messages
      description: REST surface for admin-courier-messages.
      operations:
      - method: GET
        name: listcouriermessages
        description: List Messages
        call: kratos-courier.listcouriermessages
        with:
          page_size: rest.page_size
          page_token: rest.page_token
          status: rest.status
          recipient: rest.recipient
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/courier/messages/{id}
      name: admin-courier-messages-id
      description: REST surface for admin-courier-messages-id.
      operations:
      - method: GET
        name: getcouriermessage
        description: Get a Message
        call: kratos-courier.getcouriermessage
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kratos-courier-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ory Identities API — courier. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-messages
      description: List Messages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kratos-courier.listcouriermessages
      with:
        page_size: tools.page_size
        page_token: tools.page_token
        status: tools.status
        recipient: tools.recipient
      outputParameters:
      - type: object
        mapping: $.
    - name: get-message
      description: Get a Message
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kratos-courier.getcouriermessage
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
