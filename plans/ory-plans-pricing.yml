specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Ory
providerId: ory
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Identity
  - Authentication
  - Authorization
  - OAuth2
  - OpenID Connect
  - CIAM
description: Ory Network uses a hybrid pricing model combining a fixed-tier annual subscription
  with usage-based metering on aDAU (active Daily Active Users), M2M tokens, and permission
  checks. Higher plans include lower per-unit prices and an included monthly credit. Self-hosted
  Ory Open Source remains free under Apache 2.0; Ory Enterprise (SaaS or self-hosted license)
  is custom-priced via sales.
sources:
  - https://www.ory.com/pricing
  - https://www.ory.com/docs/guides/rate-limits
plans:
  - id: ory-developer
    name: Developer
    type: freemium
    description: Free tier for evaluation and prototyping. Includes 2 development environments
      and community support only.
    entries:
      - label: Monthly Cost
        name: monthly_cost
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Development Environments
        name: dev_environments
        type: quota
        metric: environment
        limit: 2
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 2 Development Environments
      - name: Community Support
      - name: Ory Hydra (OAuth2/OIDC)
      - name: Ory Kratos (Identity)
      - name: Ory Keto (Permissions)
      - name: Ory Oathkeeper (Identity Proxy)
  - id: ory-production
    name: Production
    type: tiered
    description: Annual subscription including 1 production + 3 staging environments and a
      $21/month included usage credit. Beyond the credit, billed per aDAU, M2M token, and
      permission check.
    entries:
      - label: Annual Subscription
        name: annual_subscription
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '$770/year'
        userMultiplied: false
      - label: Included Monthly Credit
        name: monthly_credit
        type: flat
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$21.00 included/month'
        userMultiplied: false
      - label: Active Daily Active User (aDAU)
        name: adau
        type: metered
        metric: aDAU
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.14/aDAU/month'
        userMultiplied: false
      - label: M2M Token
        name: m2m_token
        type: metered
        metric: token
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.007/token/month'
        userMultiplied: false
      - label: Permission Check
        name: permission_check
        type: metered
        metric: check
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.000090/check/month'
        userMultiplied: false
    elements:
      - name: 1 Production Environment
      - name: 3 Staging Environments
      - name: Standard Support
      - name: Ory Hydra
      - name: Ory Kratos
      - name: Ory Keto
      - name: Ory Oathkeeper
  - id: ory-growth
    name: Growth
    type: tiered
    description: Higher-volume annual plan with reduced per-unit pricing and advanced features
      such as B2B SSO (OIDC) and analytics. Includes $255/month usage credit.
    entries:
      - label: Annual Subscription
        name: annual_subscription
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '$9,350/year'
        userMultiplied: false
      - label: Included Monthly Credit
        name: monthly_credit
        type: flat
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$255.00 included/month'
        userMultiplied: false
      - label: Active Daily Active User (aDAU)
        name: adau
        type: metered
        metric: aDAU
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.12/aDAU/month'
        userMultiplied: false
      - label: M2M Token
        name: m2m_token
        type: metered
        metric: token
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.006/token/month'
        userMultiplied: false
      - label: Permission Check
        name: permission_check
        type: metered
        metric: check
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.000085/check/month'
        userMultiplied: false
    elements:
      - name: 2 Production Environments
      - name: 5 Staging Environments
      - name: Advanced Analytics and Insights
      - name: B2B SSO (OIDC)
      - name: Priority Support
  - id: ory-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced SaaS or self-hosted enterprise license. Includes multi-region,
      data residency, event firehose, 99.99% SLA, premium support, and concierge onboarding.
    entries:
      - label: Annual Contract
        name: annual_contract
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Multi-Region Deployments
      - name: Data Residency
      - name: Event Firehose
      - name: 99.99% Uptime SLA
      - name: Premium Support with SLAs
      - name: Concierge Onboarding
      - name: Self-Hosted License Option
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
